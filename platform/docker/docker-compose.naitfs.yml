services:
  naitfs-postgres:
    image: postgres:16
    container_name: naitfs-postgres
    environment:
      POSTGRES_DB: naitfs_db
      POSTGRES_USER: naitfs_user
      POSTGRES_PASSWORD: naitfs_password
    ports:
      - "5432:5432"
    volumes:
      - naitfs_postgres_data:/var/lib/postgresql/data
    networks:
      - naitfs-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U naitfs_user -d naitfs_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  naitfs-qdrant:
    image: qdrant/qdrant:latest
    container_name: naitfs-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - naitfs_qdrant_data:/qdrant/storage
    networks:
      - naitfs-net

  naitfs-minio:
    image: quay.io/minio/minio:latest
    container_name: naitfs-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - naitfs_minio_data:/data
    networks:
      - naitfs-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  naitfs-kafka:
    image: apache/kafka:3.9.2
    container_name: naitfs-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@naitfs-kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://127.0.0.1:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - naitfs_kafka_data:/tmp/kraft-combined-logs
    networks:
      - naitfs-net

  naitfs-keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: naitfs-keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8081:8080"
    networks:
      - naitfs-net

  naitfs-jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: naitfs-jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    networks:
      - naitfs-net

volumes:
  naitfs_postgres_data:
  naitfs_qdrant_data:
  naitfs_minio_data:
  naitfs_kafka_data:

networks:
  naitfs-net:
    name: naitfs-net
