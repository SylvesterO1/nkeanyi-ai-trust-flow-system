server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      default-filters:
        - AddResponseHeader=X-N-AITFS-Gateway, api-gateway
      routes:
        - id: document-intelligence-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/documents/**

        - id: knowledge-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/knowledge/**

        - id: payment-orchestration-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/payments/**

        - id: compliance-evidence-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/evidence/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true