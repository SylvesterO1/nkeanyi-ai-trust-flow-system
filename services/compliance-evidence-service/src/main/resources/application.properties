
# MVP 6 observability: include tenant and correlation IDs in logs
logging.pattern.level=%5p [tenantId:%X{tenantId:-none}] [correlationId:%X{correlationId:-none}]

# MVP 6 observability: propagate tenant/correlation IDs into Kafka producer headers
spring.kafka.producer.properties.interceptor.classes=com.nkeanyi.evidence.observability.KafkaTenantCorrelationProducerInterceptor
