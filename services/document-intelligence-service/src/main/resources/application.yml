server:
  port: ${DOCUMENT_INTELLIGENCE_SERVICE_PORT:8089}

spring:
  application:
    name: document-intelligence-service
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:127.0.0.1:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

nkeanyi:
  document-intelligence:
    minio:
      endpoint: ${MINIO_ENDPOINT:http://127.0.0.1:9000}
      access-key: ${MINIO_ROOT_USER:minioadmin}
      secret-key: ${MINIO_ROOT_PASSWORD:minioadmin}
      bucket: ${MINIO_BUCKET:document-intelligence}
    knowledge:
      base-url: ${KNOWLEDGE_SERVICE_BASE_URL:http://127.0.0.1:8088}
    ocr:
      enabled: ${OCR_ENABLED:true}
      tesseract-command: ${TESSERACT_COMMAND:tesseract}
      min-extracted-chars: ${OCR_MIN_EXTRACTED_CHARS:40}
